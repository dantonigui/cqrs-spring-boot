spring.application.name=cqrs

# =========================
# MYSQL
# =========================

spring.datasource.url=${DB_URL_SQL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=OFF

# ========================
# GOOGLE
# ========================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_URL}

# =========================
# COOKIES + JWT
# =========================

app.cookie.name=${COOKIE_NAME}
app.cookie.max-age=${COOKIE_MAX_AGE}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}
app.security.email-admin=${MY_EMAIL_ADMIN}
app.refresh-token.expiration-ms=604800000
app.refresh-token.cookie-name=refresh_token

# =========================
# KAFKA
# =========================

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.max.poll.interval.ms=30000
spring.kafka.consumer.max-poll-records=10
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.properties.spring.json.type.mapping=\
  userCreated:com.project.cqrs.shared.event.user.UserCreatedEvent,\
  userUpdated:com.project.cqrs.shared.event.user.UserUpdatedEvent,\
  userLogout:com.project.cqrs.shared.event.user.UserLogoutEvent,\
  categoryCreate:com.project.cqrs.shared.event.category.CategoryCreateEvent,\
  categoryUpdate:com.project.cqrs.shared.event.category.CategoryUpdateEvent,\
  categoryDelete:com.project.cqrs.shared.event.category.CategoryDeleteEvent,\
  productCreate:com.project.cqrs.shared.event.product.ProductCreateEvent,\
  productUpdate:com.project.cqrs.shared.event.product.ProductUpdateEvent,\
  productDelete:com.project.cqrs.shared.event.product.ProductDeleteEvent

spring.kafka.consumer.group-id=default-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.type.mapping=\
  userCreated:com.project.cqrs.shared.event.user.UserCreatedEvent,\
  userUpdated:com.project.cqrs.shared.event.user.UserUpdatedEvent,\
  userLogout:com.project.cqrs.shared.event.user.UserLogoutEvent,\
  categoryCreate:com.project.cqrs.shared.event.category.CategoryCreateEvent,\
  categoryUpdate:com.project.cqrs.shared.event.category.CategoryUpdateEvent,\
  categoryDelete:com.project.cqrs.shared.event.category.CategoryDeleteEvent,\
  productCreate:com.project.cqrs.shared.event.product.ProductCreateEvent,\
  productUpdate:com.project.cqrs.shared.event.product.ProductUpdateEvent,\
  productDelete:com.project.cqrs.shared.event.product.ProductDeleteEvent

# =========================
# KAFKA TOPICS
# =========================

app.kafka.topics.user-created=user-created-topic
app.kafka.topics.user-updated=user-updated-topic
app.kafka.topics.user-logout=user-logout-topic

#app.kafka.topics.category-create=category-create-topic
#app.kafka.topics.category-update=category-update-topic
#app.kafka.topics.category-delete=category-delete-topic
#
#app.kafka.topics.product-create=product-create-topic
#app.kafka.topics.product-update=product-update-topic
#app.kafka.topics.product-delete=product-delete-topic


# ===========================
# Pageable
# ===========================
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# ==========================
# Spring Threads
# ==========================
spring.threads.virtual.enabled=true
spring.datasource.hikari.maximum-pool-size=100
server.tomcat.threads.max=8

# =========================
# SPRING ACTUATOR
# =========================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.metrics.access=unrestricted

# ========================
# REDIS CACHE
# ========================

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# Lettuce Pool
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.shutdown-timeout=100ms

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=cqrs:

# Configuraçőes customizadas da aplicaçăo
app.cache.product-list-ttl=300000
app.cache.product-detail-ttl=600000
app.cache.category-list-ttl=900000

# ========================
# SWAGGER
# ========================

# Configuraçőes Swagger
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

springdoc.api-docs.path=/api-docs